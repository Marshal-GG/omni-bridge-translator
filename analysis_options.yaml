include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    unused_import: error
    unused_local_variable: warning
    dead_code: warning

linter:
  rules:
    # ── Safety ────────────────────────────────────────────────────────────────
    avoid_print: true              # Use logging, not print()
    cancel_subscriptions: true     # StreamSubscriptions must be cancelled
    close_sinks: true              # StreamControllers/sinks must be closed
    unawaited_futures: true        # Futures must be awaited or discarded with unawaited()
    avoid_void_async: true         # Use Future<void> instead of void for async functions
    always_declare_return_types: true
