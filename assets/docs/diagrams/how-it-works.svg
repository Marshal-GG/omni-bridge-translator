<svg width="900" height="170" viewBox="0 0 900 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#000D1A"/>
      <stop offset="100%" stop-color="#001426"/>
    </linearGradient>
    <!-- pipe gradients -->
    <linearGradient id="pipe1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00FFDD" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="pipe2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7DD3FC" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="pipe3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7DD3FC" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="pipe4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00FFDD" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      /* node pulse */
      @keyframes n1p { 0%,100%{opacity:.75;filter:drop-shadow(0 0 4px #00FFDD)} 50%{opacity:1;filter:drop-shadow(0 0 12px #00FFDD)} }
      @keyframes n2p { 0%,100%{opacity:.75;filter:drop-shadow(0 0 4px #38BDF8)} 50%{opacity:1;filter:drop-shadow(0 0 12px #38BDF8)} }
      @keyframes n3p { 0%,100%{opacity:.75;filter:drop-shadow(0 0 4px #7DD3FC)} 50%{opacity:1;filter:drop-shadow(0 0 12px #7DD3FC)} }
      /* data particle flows */
      @keyframes flow1 { 0%{transform:translateX(0px);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(88px);opacity:0} }
      @keyframes flow2 { 0%{transform:translateX(0px);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(88px);opacity:0} }
      @keyframes flow3 { 0%{transform:translateX(0px);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(88px);opacity:0} }
      @keyframes flow4 { 0%{transform:translateX(0px);opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{transform:translateX(112px);opacity:0} }
      /* label fade */
      @keyframes labelIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
      .n1  { animation: n1p 2.8s ease-in-out infinite; }
      .n2  { animation: n2p 2.8s ease-in-out 0.3s infinite; }
      .n3  { animation: n3p 2.8s ease-in-out 0.6s infinite; }
      .n4  { animation: n2p 2.8s ease-in-out 0.9s infinite; }
      .n5  { animation: n1p 2.8s ease-in-out 1.2s infinite; }
      /* particles on pipe 1 (x=172..310) */
      .p1a { animation: flow1 2.0s linear 0.0s infinite; }
      .p1b { animation: flow1 2.0s linear 0.7s infinite; }
      /* particles on pipe 2 (x=348..486) */
      .p2a { animation: flow2 2.0s linear 0.2s infinite; }
      .p2b { animation: flow2 2.0s linear 0.9s infinite; }
      /* particles on pipe 3 (x=524..662) */
      .p3a { animation: flow3 2.0s linear 0.4s infinite; }
      .p3b { animation: flow3 2.0s linear 1.1s infinite; }
      /* particles on pipe 4 (x=700..838) */
      .p4a { animation: flow4 2.0s linear 0.6s infinite; }
      .p4b { animation: flow4 2.0s linear 1.3s infinite; }
      .lbl { font-family:'Courier New',monospace; font-size:10px; letter-spacing:1px; fill:#7DD3FC; opacity:0;
             animation: labelIn 0.7s ease-out forwards; }
      .em  { font-size:18px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="170" fill="url(#bg)" rx="12"/>

  <!-- ── Connecting pipes ── -->
  <!-- pipe 1: node1(cx=86,r=44) → node2(cx=262,r=44)  right=130 → left=218 -->
  <rect x="130" y="83" width="88" height="3" rx="1.5" fill="url(#pipe1)" opacity="0.25"/>
  <!-- pipe 2: node2(cx=262) → node3(cx=438)  right=306 → left=394 -->
  <rect x="306" y="83" width="88" height="3" rx="1.5" fill="url(#pipe2)" opacity="0.25"/>
  <!-- pipe 3: node3(cx=438) → node4(cx=614)  right=482 → left=570 -->
  <rect x="482" y="83" width="88" height="3" rx="1.5" fill="url(#pipe3)" opacity="0.25"/>
  <!-- pipe 4: node4(cx=614) → node5(cx=814)  right=658 → left=770 -->
  <rect x="658" y="83" width="112" height="3" rx="1.5" fill="url(#pipe4)" opacity="0.25"/>

  <!-- ── Flowing particles ── -->
  <!-- pipe 1 -->
  <circle class="p1a" cx="130" cy="85" r="4" fill="#00FFDD" filter="url(#glow)"/>
  <circle class="p1b" cx="130" cy="85" r="3" fill="#00FFDD" opacity="0.7" filter="url(#glow)"/>
  <!-- pipe 2 -->
  <circle class="p2a" cx="306" cy="85" r="4" fill="#38BDF8" filter="url(#glow)"/>
  <circle class="p2b" cx="306" cy="85" r="3" fill="#38BDF8" opacity="0.7" filter="url(#glow)"/>
  <!-- pipe 3 -->
  <circle class="p3a" cx="482" cy="85" r="4" fill="#7DD3FC" filter="url(#glow)"/>
  <circle class="p3b" cx="482" cy="85" r="3" fill="#7DD3FC" opacity="0.7" filter="url(#glow)"/>
  <!-- pipe 4 -->
  <circle class="p4a" cx="658" cy="85" r="4" fill="#38BDF8" filter="url(#glow)"/>
  <circle class="p4b" cx="658" cy="85" r="3" fill="#38BDF8" opacity="0.7" filter="url(#glow)"/>

  <!-- ══════════════════ NODES ══════════════════ -->

  <!-- Node 1 — Audio Input (cx=86) -->
  <g class="n1" transform="translate(86,85)">
    <circle r="44" fill="#001A2E" stroke="#00FFDD" stroke-width="1.5" opacity="0.9"/>
    <circle r="40" fill="#000D1A" opacity="0.6"/>
    <text y="-8" text-anchor="middle" class="em">🎙️</text>
    <text y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00FFDD" letter-spacing="1">AUDIO</text>
    <text y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00FFDD" letter-spacing="1">INPUT</text>
  </g>

  <!-- Node 2 — Python ASR (cx=262) -->
  <g class="n2" transform="translate(262,85)">
    <circle r="44" fill="#001A2E" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
    <circle r="40" fill="#000D1A" opacity="0.6"/>
    <text y="-8" text-anchor="middle" class="em">🐍</text>
    <text y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#38BDF8" letter-spacing="1">PYTHON</text>
    <text y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#38BDF8" letter-spacing="1">ASR</text>
  </g>

  <!-- Node 3 — Translation (cx=438) -->
  <g class="n3" transform="translate(438,85)">
    <circle r="44" fill="#001A2E" stroke="#7DD3FC" stroke-width="1.5" opacity="0.9"/>
    <circle r="40" fill="#000D1A" opacity="0.6"/>
    <text y="-8" text-anchor="middle" class="em">🌐</text>
    <text y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#7DD3FC" letter-spacing="1">TRANSLATE</text>
    <text y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#7DD3FC" letter-spacing="1">ENGINE</text>
  </g>

  <!-- Node 4 — WebSocket (cx=614) -->
  <g class="n4" transform="translate(614,85)">
    <circle r="44" fill="#001A2E" stroke="#38BDF8" stroke-width="1.5" opacity="0.9"/>
    <circle r="40" fill="#000D1A" opacity="0.6"/>
    <text y="-8" text-anchor="middle" class="em">⚡</text>
    <text y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#38BDF8" letter-spacing="1">WEB</text>
    <text y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#38BDF8" letter-spacing="1">SOCKET</text>
  </g>

  <!-- Node 5 — Flutter Overlay (cx=814) -->
  <g class="n5" transform="translate(814,85)">
    <circle r="44" fill="#001A2E" stroke="#00FFDD" stroke-width="1.5" opacity="0.9"/>
    <circle r="40" fill="#000D1A" opacity="0.6"/>
    <text y="-8" text-anchor="middle" class="em">🪟</text>
    <text y="12" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00FFDD" letter-spacing="1">FLUTTER</text>
    <text y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#00FFDD" letter-spacing="1">OVERLAY</text>
  </g>
</svg>
