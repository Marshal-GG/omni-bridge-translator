<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 222" width="900" height="222">
  <defs>
    <style>
      @keyframes glow { 0%,100%{opacity:.82} 50%{opacity:1} }
      @keyframes fwd  { 0%{opacity:0;transform:translateX(0)} 8%{opacity:1} 92%{opacity:1} 100%{opacity:0;transform:translateX(360px)} }
      @keyframes bwd  { 0%{opacity:0;transform:translateX(0)} 8%{opacity:1} 92%{opacity:1} 100%{opacity:0;transform:translateX(-360px)} }
      .gl  { animation:glow 2.5s ease-in-out infinite; }
      .fA  { animation:fwd 2.2s linear infinite; }
      .fB  { animation:fwd 2.2s linear 1.1s infinite; }
      .bA  { animation:bwd 2.8s linear infinite; }
      .bB  { animation:bwd 2.8s linear 1.4s infinite; }
    </style>
    <pattern id="gr" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0L0 0 0 24" fill="none" stroke="#001A2E" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="222" fill="#000D1A" rx="10"/>
  <rect width="900" height="222" fill="url(#gr)" rx="10"/>

  <!-- ── Flutter Client Card ───────────────────── -->
  <rect x="10" y="12" width="254" height="148" rx="8" fill="#001A2E" stroke="#00FFDD" stroke-width="1.2" class="gl"/>
  <rect x="10" y="12" width="254" height="30" rx="8" fill="#003040"/>
  <rect x="10" y="32"  width="254" height="10" fill="#003040"/>
  <text x="137" y="31" text-anchor="middle" font-family="Courier New,monospace" font-size="10" fill="#00FFDD" font-weight="bold" letter-spacing="2">FLUTTER CLIENT</text>
  <text x="26" y="57"  font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Clean Architecture · Feature Slices</text>
  <text x="26" y="72"  font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  BLoC · get_it Dependency Injection</text>
  <text x="26" y="87"  font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Transparent Always-on-Top Overlay</text>
  <text x="26" y="102" font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Firebase Auth + Firestore Sync</text>
  <text x="26" y="117" font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  WebSocket Audio Streaming Client</text>
  <text x="26" y="132" font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Razorpay In-App Subscriptions</text>
  <text x="137" y="151" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#0D9488" letter-spacing="2">DART · FLUTTER 3</text>

  <!-- ── WebSocket Bridge ──────────────────────── -->
  <!-- Upper line: Flutter → Python (y=72) -->
  <line x1="265" y1="72" x2="635" y2="72" stroke="#00FFDD" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.4"/>
  <text x="450" y="63"  text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#00FFDD" opacity="0.9">Audio Chunks ───────→</text>
  <!-- Forward particles -->
  <circle cx="265" cy="72" r="3" fill="#00FFDD" class="fA"/>
  <circle cx="265" cy="72" r="3" fill="#00FFDD" class="fB"/>

  <!-- Center label box -->
  <rect x="383" y="79" width="134" height="34" rx="5" fill="#001A2E" stroke="#0D9488" stroke-width="1"/>
  <text x="450" y="92"  text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#00FFDD" letter-spacing="0.5">WebSocket Bridge</text>
  <text x="450" y="106" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#38BDF8">ws://localhost:8765 · Async</text>

  <!-- Lower line: Python → Flutter (y=120) -->
  <line x1="635" y1="120" x2="265" y2="120" stroke="#38BDF8" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.4"/>
  <text x="450" y="133" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#38BDF8" opacity="0.9">←─────── Translated Captions</text>
  <!-- Backward particles -->
  <circle cx="635" cy="120" r="3" fill="#38BDF8" class="bA"/>
  <circle cx="635" cy="120" r="3" fill="#38BDF8" class="bB"/>

  <!-- ── Python Backend Card ──────────────────── -->
  <rect x="636" y="12" width="254" height="148" rx="8" fill="#001A2E" stroke="#38BDF8" stroke-width="1.2" class="gl"/>
  <rect x="636" y="12"  width="254" height="30" rx="8" fill="#002233"/>
  <rect x="636" y="32"  width="254" height="10"       fill="#002233"/>
  <text x="763" y="31" text-anchor="middle" font-family="Courier New,monospace" font-size="10" fill="#38BDF8" font-weight="bold" letter-spacing="2">PYTHON BACKEND</text>
  <text x="652" y="57"  font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Async Session Manager + Lifecycle</text>
  <text x="652" y="72"  font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Modular ASR Pipeline + Auto-Fallback</text>
  <text x="652" y="87"  font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Multi-Engine Translation Layer</text>
  <text x="652" y="102" font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  Dynamic Model Loader (GPU / CPU)</text>
  <text x="652" y="117" font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  pytest Suite · AI Engine Mocking</text>
  <text x="652" y="132" font-family="Courier New,monospace" font-size="8.5" fill="#7DD3FC">▸  GitHub Actions CI/CD Pipeline</text>
  <text x="763" y="151" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#0284C7" letter-spacing="2">PYTHON 3.11 · ASYNCIO</text>

  <!-- ── Sub-system connectors ────────────────── -->
  <line x1="137" y1="160" x2="137" y2="173" stroke="#00FFDD" stroke-width="0.7" opacity="0.35"/>
  <line x1="763" y1="160" x2="763" y2="173" stroke="#38BDF8" stroke-width="0.7" opacity="0.35"/>

  <!-- Section labels -->
  <text x="12"  y="170" font-family="Courier New,monospace" font-size="6.5" fill="#00FFDD" opacity="0.5" letter-spacing="1">SERVICES</text>
  <text x="495" y="170" font-family="Courier New,monospace" font-size="6.5" fill="#38BDF8" opacity="0.5" letter-spacing="1">AI ENGINES</text>

  <!-- Sub-card: Firebase -->
  <rect x="10"  y="173" width="116" height="42" rx="6" fill="#001A2E" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="68"  y="191" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#F59E0B" font-weight="bold">Firebase</text>
  <text x="68"  y="207" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#7DD3FC">Auth · Firestore</text>

  <!-- Sub-card: Razorpay -->
  <rect x="136" y="173" width="116" height="42" rx="6" fill="#001A2E" stroke="#818CF8" stroke-width="0.8"/>
  <text x="194" y="191" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#818CF8" font-weight="bold">Razorpay</text>
  <text x="194" y="207" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#7DD3FC">Subscriptions</text>

  <!-- Sub-card: NVIDIA Riva -->
  <rect x="495" y="173" width="90" height="42" rx="6" fill="#001A2E" stroke="#76B900" stroke-width="0.8"/>
  <text x="540" y="191" text-anchor="middle" font-family="Courier New,monospace" font-size="8"   fill="#76B900" font-weight="bold">NVIDIA Riva</text>
  <text x="540" y="207" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#7DD3FC">ASR + NMT</text>

  <!-- Sub-card: Whisper -->
  <rect x="595" y="173" width="90" height="42" rx="6" fill="#001A2E" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="640" y="191" text-anchor="middle" font-family="Courier New,monospace" font-size="8"   fill="#F59E0B" font-weight="bold">Whisper</text>
  <text x="640" y="207" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#7DD3FC">Tiny – Medium</text>

  <!-- Sub-card: Llama -->
  <rect x="695" y="173" width="90" height="42" rx="6" fill="#001A2E" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="740" y="191" text-anchor="middle" font-family="Courier New,monospace" font-size="8"   fill="#A78BFA" font-weight="bold">Llama 3.1</text>
  <text x="740" y="207" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#7DD3FC">8B Translation</text>

  <!-- Sub-card: Google -->
  <rect x="795" y="173" width="95" height="42" rx="6" fill="#001A2E" stroke="#34A853" stroke-width="0.8"/>
  <text x="842" y="191" text-anchor="middle" font-family="Courier New,monospace" font-size="8"   fill="#34A853" font-weight="bold">Google APIs</text>
  <text x="842" y="207" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#7DD3FC">Speech + TL</text>
</svg>
