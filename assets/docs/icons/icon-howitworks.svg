<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    @keyframes fGlow { 0%,100%{filter:drop-shadow(0 0 3px #00FFDD55)} 50%{filter:drop-shadow(0 0 6px #00FFDDaa)} }
    @keyframes fDash { to { stroke-dashoffset: -12; } }
    .fg { animation:fGlow 2.5s ease-in-out infinite; }
    .fd { animation:fDash 1.2s linear infinite; }
  </style>
  <g class="fg">
    <circle cx="6"  cy="16" r="4"   fill="#0D9488" stroke="#00FFDD" stroke-width="1"/>
    <line x1="10" y1="16" x2="14" y2="16" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="3,2" class="fd"/>
    <circle cx="16" cy="16" r="4"   fill="#0284C7" stroke="#38BDF8" stroke-width="1"/>
    <line x1="20" y1="14" x2="23" y2="10" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="3,2" class="fd"/>
    <line x1="20" y1="18" x2="23" y2="22" stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="3,2" class="fd"/>
    <circle cx="26" cy="10" r="3"   fill="#0369A1" stroke="#7DD3FC" stroke-width="0.8"/>
    <circle cx="26" cy="22" r="3"   fill="#0369A1" stroke="#7DD3FC" stroke-width="0.8"/>
  </g>
</svg>
