on:
  workflow_dispatch:  # Manual-only — run from GitHub Actions tab

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Flutter Setup ─────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Windows (release)
        run: flutter build windows --release

      # ── Python Server Setup ───────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: server
        run: |
          pip install pyinstaller
          pip install .
          # Hardware-specific packages (may fail on generic runners)
          pip install ".[hardware]" || echo "Optional hardware dependencies skipped"

      - name: Build Python server with PyInstaller
        working-directory: server
        run: pyinstaller omni_bridge_server.spec

      # ── Inno Setup Installer ──────────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        run: iscc installer_setup.iss

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installers/OmniBridge_Setup_v*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
