# CI is currently PAUSED — triggers disabled.
# To re-enable, replace the `on:` block below with:
#   on:
#     push:
#       branches: [ "main" ]
#     pull_request:
#       branches: [ "main" ]
on:
  workflow_dispatch:  # Manual-only — run from GitHub Actions tab

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Analyze + Test + Coverage
  # ─────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false   # Don't break CI if Codecov is down

  # ─────────────────────────────────────────────
  # Job 2: Build Verification (Windows)
  # ─────────────────────────────────────────────
  build_windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test   # Only runs if analyze + test pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release
