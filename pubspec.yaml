name: omni_bridge
description: "Omni Bridge: Live AI Translator. A real-time system audio translation application using Windows desktop capture and AI microservices."

repository: https://github.com/Marshal-GG/omni-bridge-translator
issue_tracker: https://github.com/Marshal-GG/omni-bridge-translator/issues

version: 1.2.3+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 
  provider: 
  http: 
  bitsdojo_window: 
  tray_manager: 
  window_manager: 
  system_tray: 
  flutter_acrylic:
  ffi: ^2.1.5
  web_socket_channel: ^3.0.3
  dropdown_search: ^5.0.6
  path: ^1.9.0
  intl: ^0.20.2
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  desktop_webview_auth: ^0.0.16
  google_sign_in_all_platforms: ^2.0.2
  protocol_handler: ^0.2.0
  app_links: ^7.0.0
  url_launcher: ^6.3.2
  windows_single_instance: ^1.1.0
  firebase_database: ^12.1.4
  device_info_plus: ^11.3.0
  network_info_plus: ^7.0.0
  shared_preferences: ^2.5.4
  package_info_plus: ^9.0.0
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: false
  ios: false
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/
